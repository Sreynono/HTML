<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exercise2</title>
    <style>
      .parent {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        align-items: center;
        width: 500px;
        height: 500px;
        background-color: rgb(128, 200, 223);
      }
      .wrapper1 {
        width: 200px;
        height: 200px;
        background-color: lightgray;
        display: flex;
        justify-content: start;
        align-items: start;
        padding: 4px;
      }

      .child1 {
        width: 200px;
        height: 50px;
        background-color: orange;
        text-align: center;
        line-height: 50px;
        color: white;
      }
      .wrapper2 {
        width: 200px;
        height: 200px;
        background-color: lightgray;
        display: flex;
        justify-content: start;
        align-items: start;
        padding: 4px;
      }
      .child2 {
        width: 50px;
        height: 200px;
        background-color: orange;
        text-align: center;
        line-height: 200px;
        color: white;
      }
      .wrapper3 {
        width: 200px;
        height: 200px;
        background-color: lightgray;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 4px;
      }
      .child3 {
        width: 200px;
        height: 50px;
        background-color: orange;
        text-align: center;
        line-height: 50px;
        color: white;
      }
      .wrapper4 {
        width: 200px;
        height: 200px;
        background-color: lightgray;
        display: flex;
        justify-content: end;
        align-items: end;
        padding: 4px;
      }
      .child4 {
        width: 50px;
        height: 200px;
        background-color: orange;
        text-align: center;
        line-height: 200px;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="wrapper1">
        <div class="child1">child</div>
      </div>
      <div class="wrapper2">
        <div class="child2">child</div>
      </div>
      <div class="wrapper3">
        <div class="child3">child</div>
      </div>
      <div class="wrapper4">
        <div class="child4">child</div>
      </div>
    </div>
  </body>
</html>
